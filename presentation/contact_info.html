<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Montserrat', sans-serif; background: #F7FAFC; color: #718096; }
      .slide-container { 
        width: 1280px; 
        min-height: 720px; 
        display: flex; 
        align-items: center; 
        justify-content: center;
        padding-top: 60px;
      }
      .content-wrapper {
        width: 1100px;
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 20px;
        border: 1px solid rgba(49, 151, 149, 0.2);
        padding-top: 40px;
        padding-left: 40px;
        padding-right: 40px;
        min-height: 500px;
        background: white;
      }
      .left-col {
        grid-column: span 4;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        padding-top: 20px;
      }
      .right-col {
        grid-column: span 8;
        display: flex;
        flex-direction: column;
        justify-content: center;
        border-left: 1px solid rgba(49, 151, 149, 0.1);
        padding-left: 60px;
      }
      h2 { 
        font-size: 48px; 
        font-weight: 500; 
        color: #2D3748; 
        line-height: 1.2;
        margin-bottom: 20px;
      }
      .contact-list {
        display: flex;
        flex-direction: column;
        gap: 40px;
      }
      .contact-item {
        display: flex;
        align-items: center;
        gap: 25px;
      }
      .contact-icon {
        font-size: 32px;
        color: #319795;
        width: 40px;
        text-align: center;
      }
      .contact-text {
        display: flex;
        flex-direction: column;
      }
      .contact-label {
        font-size: 16px;
        font-weight: 500;
        color: #319795;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 5px;
      }
      .contact-value {
        font-size: 24px;
        color: #2D3748;
      }
      .main-icon {
        font-size: 100px;
        color: #319795;
        opacity: 0.2;
        margin-top: 40px;
      }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="content-wrapper">
            <div class="left-col">
                <h2>Contato</h2>
                <div class="main-icon">
                    <i class="fas fa-paper-plane"></i>
                </div>
            </div>
            <div class="right-col">
                <div class="contact-list">
                    <div class="contact-item">
                        <div class="contact-icon"><i class="fas fa-envelope"></i></div>
                        <div class="contact-text">
                            <span class="contact-label">Email</span>
                            <span class="contact-value">paulo.robertodearaujo2005@gmail.com</span>
                        </div>
                    </div>
                    <div class="contact-item">
                        <div class="contact-icon"><i class="fas fa-phone-alt"></i></div>
                        <div class="contact-text">
                            <span class="contact-label">Telefone</span>
                            <span class="contact-value">+55 (11) 93151.8676</span>
                        </div>
                    </div>
                    <div class="contact-item">
                        <div class="contact-icon"><i class="fas fa-map-marker-alt"></i></div>
                        <div class="contact-text">
                            <span class="contact-label">Localização</span>
                            <span class="contact-value">São Paulo, Brasil</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
