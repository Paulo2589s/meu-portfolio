<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Montserrat', sans-serif; background: #F7FAFC; color: #718096; }
      .slide-container { 
        width: 1280px; 
        min-height: 720px; 
        display: flex; 
        align-items: center; 
        justify-content: center;
        padding-top: 60px;
      }
      .content-wrapper {
        width: 1100px;
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 20px;
        border: 1px solid rgba(49, 151, 149, 0.2);
        padding-top: 40px;
        padding-left: 40px;
        padding-right: 40px;
        min-height: 500px;
        background: white;
      }
      .left-col {
        grid-column: span 7;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .right-col {
        grid-column: span 5;
        display: flex;
        align-items: center;
        justify-content: center;
        border-left: 1px solid rgba(49, 151, 149, 0.1);
      }
      h1 { 
        font-size: 64px; 
        font-weight: 500; 
        color: #2D3748; 
        line-height: 1.1;
        margin-bottom: 20px;
      }
      .subtitle { 
        font-size: 32px; 
        color: #319795; 
        margin-bottom: 30px;
      }
      .tagline {
        font-size: 20px;
        color: #718096;
      }
      .icon-box {
        font-size: 180px;
        color: #319795;
        opacity: 0.8;
      }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="content-wrapper">
            <div class="left-col">
                <h1>Portfólio Profissional</h1>
                <div class="subtitle">Desenvolvedor Paulo</div>
                <div class="tagline">Criando soluções web modernas e eficientes</div>
            </div>
            <div class="right-col">
                <div class="icon-box">
                    <i class="fas fa-code"></i>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
