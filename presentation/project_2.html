<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Montserrat', sans-serif; background: #F7FAFC; color: #718096; }
      .slide-container { 
        width: 1280px; 
        min-height: 720px; 
        display: flex; 
        align-items: center; 
        justify-content: center;
        padding-top: 60px;
      }
      .content-wrapper {
        width: 1100px;
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 20px;
        border: 1px solid rgba(49, 151, 149, 0.2);
        padding-top: 40px;
        padding-left: 40px;
        padding-right: 40px;
        min-height: 500px;
        background: white;
      }
      .left-col {
        grid-column: span 4;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        padding-top: 20px;
      }
      .right-col {
        grid-column: span 8;
        display: flex;
        flex-direction: column;
        justify-content: center;
        border-left: 1px solid rgba(49, 151, 149, 0.1);
        padding-left: 40px;
      }
      h2 { 
        font-size: 42px; 
        font-weight: 500; 
        color: #2D3748; 
        line-height: 1.2;
        margin-bottom: 20px;
      }
      .icon-box {
        font-size: 80px;
        color: #319795;
        margin-bottom: 20px;
      }
      h3 {
        font-size: 28px;
        color: #319795;
        margin-bottom: 15px;
        font-weight: 500;
      }
      p {
        font-size: 22px;
        line-height: 1.6;
        color: #718096;
        margin-bottom: 25px;
      }
      .tech-stack {
        font-size: 18px;
        font-weight: 500;
        color: #2D3748;
        margin-bottom: 10px;
      }
      .demo-link {
        font-size: 18px;
        color: #319795;
        text-decoration: none;
        border-top: 1px solid rgba(49, 151, 149, 0.2);
        padding-top: 15px;
        display: inline-block;
      }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="content-wrapper">
            <div class="left-col">
                <div class="icon-box">
                    <i class="fas fa-chart-bar"></i>
                </div>
                <h2>Projeto em Destaque</h2>
            </div>
            <div class="right-col">
                <h3>Excel Dashboard Dash</h3>
                <p>
                    Para facilitar as análises de dados de planilhas longas e complicadas, essa ferramenta está pronta para ajudar a simplificar e encurtar todo o trabalho de comparar dados.
                </p>
                <div class="tech-stack">Tecnologias: JavaScript, CSS</div>
                <a href="https://exceldash-lvq6u2fr.manus.space/" class="demo-link">
                    <i class="fas fa-external-link-alt"></i> Ver Demonstração
                </a>
            </div>
        </div>
    </div>
</body>
</html>
