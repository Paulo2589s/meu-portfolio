<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Montserrat', sans-serif; background: #F7FAFC; color: #718096; }
      .slide-container { 
        width: 1280px; 
        min-height: 720px; 
        display: flex; 
        align-items: center; 
        justify-content: center;
        padding-top: 60px;
      }
      .content-wrapper {
        width: 1100px;
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 20px;
        border: 1px solid rgba(49, 151, 149, 0.2);
        padding-top: 40px;
        padding-left: 40px;
        padding-right: 40px;
        min-height: 500px;
        background: white;
      }
      .left-col {
        grid-column: span 4;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        padding-top: 20px;
      }
      .right-col {
        grid-column: span 8;
        display: flex;
        flex-direction: column;
        justify-content: center;
        border-left: 1px solid rgba(49, 151, 149, 0.1);
        padding-left: 40px;
      }
      h2 { 
        font-size: 48px; 
        font-weight: 500; 
        color: #2D3748; 
        line-height: 1.2;
        margin-bottom: 20px;
      }
      .skills-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 30px;
        padding-top: 20px;
      }
      .skill-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding-top: 20px;
      }
      .skill-icon {
        font-size: 48px;
        color: #319795;
        margin-bottom: 10px;
      }
      .skill-name {
        font-size: 20px;
        font-weight: 500;
        color: #2D3748;
      }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="content-wrapper">
            <div class="left-col">
                <h2>Habilidades Técnicas</h2>
            </div>
            <div class="right-col">
                <div class="skills-grid">
                    <div class="skill-item">
                        <i class="fab fa-html5 skill-icon"></i>
                        <span class="skill-name">HTML5</span>
                    </div>
                    <div class="skill-item">
                        <i class="fab fa-css3-alt skill-icon"></i>
                        <span class="skill-name">CSS3</span>
                    </div>
                    <div class="skill-item">
                        <i class="fab fa-js skill-icon"></i>
                        <span class="skill-name">JavaScript</span>
                    </div>
                    <div class="skill-item">
                        <i class="fab fa-react skill-icon"></i>
                        <span class="skill-name">React</span>
                    </div>
                    <div class="skill-item">
                        <i class="fab fa-node-js skill-icon"></i>
                        <span class="skill-name">Node.js</span>
                    </div>
                    <div class="skill-item">
                        <i class="fas fa-file-code skill-icon"></i>
                        <span class="skill-name">XML</span>
                    </div>
                    <div class="skill-item">
                        <i class="fab fa-git-alt skill-icon"></i>
                        <span class="skill-name">Git</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
