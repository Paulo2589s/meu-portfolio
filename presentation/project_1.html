<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Montserrat', sans-serif; background: #F7FAFC; color: #718096; }
      .slide-container { 
        width: 1280px; 
        min-height: 720px; 
        display: flex; 
        align-items: center; 
        justify-content: center;
        padding-top: 60px;
      }
      .content-wrapper {
        width: 1100px;
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 20px;
        border: 1px solid rgba(49, 151, 149, 0.2);
        padding-top: 40px;
        padding-left: 40px;
        padding-right: 40px;
        min-height: 500px;
        background: white;
      }
      .left-col {
        grid-column: span 4;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        padding-top: 20px;
      }
      .right-col {
        grid-column: span 8;
        display: flex;
        flex-direction: column;
        justify-content: center;
        border-left: 1px solid rgba(49, 151, 149, 0.1);
        padding-left: 40px;
      }
      h2 { 
        font-size: 42px; 
        font-weight: 500; 
        color: #2D3748; 
        line-height: 1.2;
        margin-bottom: 20px;
      }
      .project-icon {
        font-size: 80px;
        color: #319795;
        margin-bottom: 20px;
      }
      .project-description {
        font-size: 22px;
        line-height: 1.6;
        color: #718096;
        margin-bottom: 30px;
      }
      .tech-stack {
        padding-top: 20px;
        border-top: 1px solid rgba(49, 151, 149, 0.1);
      }
      .tech-label {
        font-weight: 500;
        color: #2D3748;
        font-size: 18px;
        margin-bottom: 10px;
        display: block;
      }
      .tech-tags {
        font-size: 18px;
        color: #319795;
      }
      .demo-link {
        padding-top: 30px;
        font-size: 18px;
      }
      .demo-link a {
        color: #319795;
        text-decoration: none;
        font-weight: 500;
      }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="content-wrapper">
            <div class="left-col">
                <div class="project-icon">
                    <i class="fas fa-calendar-check"></i>
                </div>
                <h2>Agenda Inteligente</h2>
            </div>
            <div class="right-col">
                <p class="project-description">
                    Uma solução intuitiva para a organização do dia a dia. Esta agenda ajuda a monitorar tarefas concluídas e pendentes, garantindo que compromissos importantes nunca sejam esquecidos.
                </p>
                <div class="tech-stack">
                    <span class="tech-label">Tecnologias Utilizadas:</span>
                    <span class="tech-tags">Ferramentas Web, HTML, CSS, JavaScript</span>
                </div>
                <div class="demo-link">
                    <i class="fas fa-external-link-alt"></i> 
                    <a href="https://dailyremind-mwkyr8h7.manus.space/">Ver Demo Online</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
